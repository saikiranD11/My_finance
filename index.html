<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MyFinance"/>
<meta name="theme-color" content="#0F0F1A"/>
<title>MyFinance</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Sora',sans-serif;background:#0F0F1A;color:#EEE8FF;min-height:100vh;overflow-x:hidden}
:root{
  --bg:#0F0F1A;--card:#1C1C30;--card2:#23233A;--border:#2E2E4A;
  --accent:#7C6FF7;--accent2:#A78BFA;--green:#34D399;--red:#F87171;
  --yellow:#FBBF24;--text:#EEE8FF;--muted:#7878A8;
}

/* HEADER */
.header{background:linear-gradient(135deg,#1A1A2E 0%,#16213E 50%,#0F3460 100%);padding:20px 18px 16px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(124,111,247,.25) 0%,transparent 70%)}
.app-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.app-name{font-family:'Playfair Display',serif;font-size:22px}

/* ACCOUNT CARDS SCROLL */
.accounts-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:0}
.accounts-scroll::-webkit-scrollbar{display:none}
.acc-card{min-width:160px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px;cursor:pointer;transition:all .2s;flex-shrink:0;position:relative}
.acc-card.default-acc{border-color:var(--accent);background:rgba(124,111,247,.15)}
.acc-card .acc-icon{font-size:22px;margin-bottom:6px}
.acc-card .acc-name{font-size:12px;color:rgba(255,255,255,.7);margin-bottom:4px;font-weight:500}
.acc-card .acc-bal{font-family:'Playfair Display',serif;font-size:20px;color:#fff}
.acc-card .default-badge{position:absolute;top:8px;right:8px;background:var(--accent);color:#fff;font-size:9px;padding:2px 7px;border-radius:999px;font-weight:600;letter-spacing:.04em}
.total-row{display:flex;gap:20px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08)}
.total-item{font-size:12px}
.total-item-label{color:rgba(255,255,255,.5);margin-bottom:2px}
.total-item-val{font-weight:600}

/* TABS */
.tabs-wrap{background:#0F0F1A;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 10px}
.tabs::-webkit-scrollbar{display:none}
.tab{border:none;background:none;color:var(--muted);font-family:'Sora',sans-serif;font-size:13px;padding:13px 14px;white-space:nowrap;cursor:pointer;position:relative;transition:color .2s}
.tab.active{color:var(--accent2)}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:2px 2px 0 0}

/* BODY */
.body{padding:16px 16px 90px}
label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:5px}
.input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'Sora',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
select.input{appearance:none}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.fgroup{margin-bottom:13px}

/* ACCOUNT PICKER in forms */
.acc-pick-wrap{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:2px}
.acc-pick-wrap::-webkit-scrollbar{display:none}
.acc-pick{border:1.5px solid var(--border);background:var(--card2);color:var(--muted);border-radius:10px;padding:8px 14px;font-family:'Sora',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.acc-pick.sel{border-color:var(--accent);color:var(--accent2);background:rgba(124,111,247,.15)}

/* BUTTONS */
.btn{width:100%;border:none;border-radius:12px;padding:14px;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:2px}
.btn:active{opacity:.8}
.btn-primary{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#0F0F1A}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:10px;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-weight:600}

/* CARDS */
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid var(--border)}
.card-row{display:flex;align-items:center;gap:12px}
.icon-box{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-title{font-size:15px;font-weight:500}
.tx-sub{font-size:12px;color:var(--muted);margin-top:2px}
.tx-amt{font-family:'Playfair Display',serif;font-size:17px;text-align:right;flex-shrink:0}
.del-btn{background:none;border:none;color:var(--border);font-size:20px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0}
.del-btn:active{color:var(--red)}

/* PILL */
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
.pill-red{background:rgba(248,113,113,.15);color:var(--red)}
.pill-green{background:rgba(52,211,153,.15);color:var(--green)}
.pill-yellow{background:rgba(251,191,36,.15);color:var(--yellow)}
.pill-accent{background:rgba(124,111,247,.15);color:var(--accent2)}

/* PROGRESS */
.prog-track{height:5px;border-radius:999px;background:var(--border);margin-top:10px;overflow:hidden}
.prog-fill{height:5px;border-radius:999px;background:var(--green);transition:width .6s}

/* AVATAR */
.avatar{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}

/* BAR */
.bar-row{margin-bottom:14px}
.bar-info{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.bar-track{height:8px;border-radius:999px;background:var(--border)}
.bar-fill{height:8px;border-radius:999px;transition:width .6s}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#1C1C30;border-radius:24px 24px 0 0;padding:24px 18px 36px;width:100%;max-width:480px;border-top:1px solid var(--border);max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:18px}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 22px;border-radius:999px;font-size:13px;z-index:300;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;color:var(--muted);padding:50px 0;font-size:14px}
.section-head{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border)}
.stat-box-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-box-val{font-family:'Playfair Display',serif;font-size:22px}
.acc-tag{font-size:11px;color:var(--accent2);background:rgba(124,111,247,.12);padding:2px 8px;border-radius:999px;display:inline-block;margin-top:3px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="app-row">
    <span class="app-name">MyFinance</span>
    <button onclick="openModal('addAccModal')" style="background:rgba(124,111,247,.2);border:1px solid var(--accent);color:var(--accent2);border-radius:999px;padding:6px 14px;font-family:'Sora',sans-serif;font-size:12px;cursor:pointer">＋ Account</button>
  </div>
  <!-- Account cards -->
  <div class="accounts-scroll" id="accountsScroll"></div>
  <!-- Totals row -->
  <div class="total-row">
    <div class="total-item"><div class="total-item-label">Total Balance</div><div class="total-item-val" id="hdrTotal">₹0</div></div>
    <div class="total-item"><div class="total-item-label">↑ Income</div><div class="total-item-val" style="color:var(--green)" id="hdrInc">₹0</div></div>
    <div class="total-item"><div class="total-item-label">↓ Spent</div><div class="total-item-val" style="color:var(--red)" id="hdrExp">₹0</div></div>
    <div class="total-item"><div class="total-item-label">⟳ Pending</div><div class="total-item-val" style="color:var(--yellow)" id="hdrPend">₹0</div></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add',this)">＋ Expense</button>
    <button class="tab" onclick="switchTab('income',this)">💰 Income</button>
    <button class="tab" onclick="switchTab('people',this)">👤 People</button>
    <button class="tab" onclick="switchTab('history',this)">History</button>
    <button class="tab" onclick="switchTab('summary',this)">Summary</button>
  </div>
</div>

<!-- BODY -->
<div class="body">

  <!-- ADD EXPENSE -->
  <div id="tab-add">
    <div class="fgroup"><label>From Account</label><div class="acc-pick-wrap" id="expAccPick"></div></div>
    <div class="fgroup"><label>Amount (₹)</label><input class="input" type="number" id="expAmt" placeholder="0"/></div>
    <div class="fgroup"><label>Category</label>
      <select class="input" id="expCat">
        <option value="food">🍔 Food</option>
        <option value="transport">🚗 Transport</option>
        <option value="shopping">🛍️ Shopping</option>
        <option value="bills">💡 Bills</option>
        <option value="entertainment">🎬 Entertainment</option>
        <option value="health">🏥 Health</option>
        <option value="other">📦 Other</option>
      </select>
    </div>
    <div class="fgroup"><label>Note (optional)</label><input class="input" id="expNote" placeholder="What was this for?"/></div>
    <div class="fgroup"><label>Date</label><input class="input" type="date" id="expDate"/></div>
    <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>
  </div>

  <!-- INCOME -->
  <div id="tab-income" style="display:none">
    <div class="fgroup"><label>To Account</label><div class="acc-pick-wrap" id="incAccPick"></div></div>
    <div class="fgroup"><label>Amount (₹)</label><input class="input" type="number" id="incAmt" placeholder="0"/></div>
    <div class="fgroup"><label>Source</label>
      <select class="input" id="incSrc">
        <option value="salary">💼 Salary</option>
        <option value="freelance">💻 Freelance</option>
        <option value="gift">🎁 Gift</option>
        <option value="investment">📈 Investment</option>
        <option value="other">📦 Other</option>
      </select>
    </div>
    <div class="fgroup"><label>Note (optional)</label><input class="input" id="incNote" placeholder="e.g. March salary"/></div>
    <div class="fgroup"><label>Date</label><input class="input" type="date" id="incDate"/></div>
    <button class="btn btn-green" onclick="addIncome()">Add Income</button>
  </div>

  <!-- PEOPLE -->
  <div id="tab-people" style="display:none">
    <div class="card" style="margin-bottom:18px">
      <div style="font-family:'Playfair Display',serif;font-size:17px;margin-bottom:14px">💸 Gave Money To</div>
      <div class="fgroup"><label>From Account</label><div class="acc-pick-wrap" id="loanAccPick"></div></div>
      <div class="fgroup"><label>Person's Name</label><input class="input" id="loanName" placeholder="e.g. Rahul"/></div>
      <div class="row2">
        <div class="fgroup"><label>Amount (₹)</label><input class="input" type="number" id="loanAmt" placeholder="0"/></div>
        <div class="fgroup"><label>Date</label><input class="input" type="date" id="loanDate"/></div>
      </div>
      <div class="fgroup"><label>Note (optional)</label><input class="input" id="loanNote" placeholder="Reason"/></div>
      <button class="btn btn-primary" onclick="addLoan()">Record</button>
    </div>
    <div id="peopleList"></div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" style="display:none">
    <div class="fgroup">
      <label>Filter by Account</label>
      <div class="acc-pick-wrap" id="histFilterPick"></div>
    </div>
    <div id="historyList"></div>
  </div>

  <!-- SUMMARY -->
  <div id="tab-summary" style="display:none">
    <div class="section-head">Accounts Overview</div>
    <div id="accSummary"></div>
    <div class="section-head">Spending by Category</div>
    <div id="categoryBars"></div>
    <div class="section-head">Income by Source</div>
    <div id="incomeBars"></div>
  </div>

</div>

<!-- ADD ACCOUNT MODAL -->
<div class="modal-bg" id="addAccModal">
  <div class="modal">
    <div class="modal-title">＋ Add Account</div>
    <div class="fgroup"><label>Account Name</label>
      <input class="input" id="accName" placeholder="e.g. SBI Savings, HDFC, Cash, GPay"/>
    </div>
    <div class="fgroup"><label>Icon</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="iconPicker">
        <span>🏦</span><span>💳</span><span>💵</span><span>🏧</span><span>📱</span><span>💰</span><span>🏠</span><span>✈️</span>
      </div>
    </div>
    <div class="fgroup"><label>Opening Balance (₹)</label>
      <input class="input" type="number" id="accBal" placeholder="0"/>
    </div>
    <div class="fgroup"><label>Color</label>
      <div style="display:flex;gap:10px;flex-wrap:wrap" id="colorPicker"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <input type="checkbox" id="accDefault" style="width:18px;height:18px;accent-color:var(--accent)"/>
      <label style="font-size:13px;color:var(--text);text-transform:none;letter-spacing:0;margin:0">Set as default account</label>
    </div>
    <button class="btn btn-primary" onclick="addAccount()" style="margin-bottom:10px">Add Account</button>
    <button class="btn btn-ghost" onclick="closeModal('addAccModal')">Cancel</button>
  </div>
</div>

<!-- ACCOUNT DETAIL MODAL -->
<div class="modal-bg" id="accDetailModal">
  <div class="modal">
    <div class="modal-title" id="accDetailTitle">Account</div>
    <div id="accDetailContent"></div>
    <button class="btn btn-ghost" style="margin-top:10px" onclick="closeModal('accDetailModal')">Close</button>
  </div>
</div>

<!-- RETURN MODAL -->
<div class="modal-bg" id="returnModal">
  <div class="modal">
    <div class="modal-title">↩ Mark Return</div>
    <div class="fgroup"><label>To Account</label><div class="acc-pick-wrap" id="retAccPick"></div></div>
    <div class="fgroup"><label>Amount Returned (₹)</label><input class="input" type="number" id="retAmt" placeholder="0"/></div>
    <div class="fgroup"><label>Date</label><input class="input" type="date" id="retDate"/></div>
    <button class="btn btn-green" onclick="confirmReturn()" style="margin-bottom:10px">Confirm Return</button>
    <button class="btn btn-ghost" onclick="closeModal('returnModal')">Cancel</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────
const CATS={food:{label:'🍔 Food',color:'#FF6B6B'},transport:{label:'🚗 Transport',color:'#4ECDC4'},shopping:{label:'🛍️ Shopping',color:'#FFE66D'},bills:{label:'💡 Bills',color:'#A8E6CF'},entertainment:{label:'🎬 Entertainment',color:'#C3A6FF'},health:{label:'🏥 Health',color:'#FF9A9E'},other:{label:'📦 Other',color:'#B8BEC8'}};
const INCSRC={salary:{label:'💼 Salary',color:'#34D399'},freelance:{label:'💻 Freelance',color:'#60A5FA'},gift:{label:'🎁 Gift',color:'#F472B6'},investment:{label:'📈 Investment',color:'#A78BFA'},other:{label:'📦 Other',color:'#B8BEC8'}};
const ACC_COLORS=['#7C6FF7','#34D399','#F87171','#FBBF24','#60A5FA','#F472B6','#A78BFA','#4ECDC4'];
const ICONS=['🏦','💳','💵','🏧','📱','💰','🏠','✈️'];

// ── DATA ──────────────────────────────────────────────
let data={accounts:[],expenses:[],income:[],loans:[]};
// Selected states
let selExpAcc=null,selIncAcc=null,selLoanAcc=null,selRetAcc=null,selHistAcc='all';
let selIcon='🏦',selColor='#7C6FF7';
let pendingReturnId=null;

function load(){const s=localStorage.getItem('myfinance_v2');if(s)data=JSON.parse(s);}
function save(){localStorage.setItem('myfinance_v2',JSON.stringify(data));}
const fmt=n=>new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR',maximumFractionDigits:0}).format(n);
const today=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const defaultAcc=()=>data.accounts.find(a=>a.isDefault)||data.accounts[0];

// ── TOAST ─────────────────────────────────────────────
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

// ── MODAL ─────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});});

// ── TABS ──────────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('[id^=tab-]').forEach(t=>t.style.display='none');
  document.getElementById('tab-'+name).style.display='';
  if(name==='add') renderAccPick('expAccPick','exp');
  if(name==='income') renderAccPick('incAccPick','inc');
  if(name==='people'){renderAccPick('loanAccPick','loan');renderPeople();}
  if(name==='history'){renderHistFilter();renderHistory();}
  if(name==='summary') renderSummary();
}

// ── ACCOUNT PICKER ────────────────────────────────────
function renderAccPick(containerId, type){
  const el=document.getElementById(containerId);
  if(!el)return;
  if(data.accounts.length===0){el.innerHTML='<span style="color:var(--muted);font-size:13px">No accounts — tap ＋ Account</span>';return;}
  let sel;
  if(type==='exp') sel=selExpAcc;
  else if(type==='inc') sel=selIncAcc;
  else if(type==='loan') sel=selLoanAcc;
  else if(type==='ret') sel=selRetAcc;
  // auto-select default
  const def=defaultAcc();
  if(!sel&&def){
    if(type==='exp') selExpAcc=def.id;
    else if(type==='inc') selIncAcc=def.id;
    else if(type==='loan') selLoanAcc=def.id;
    else if(type==='ret') selRetAcc=def.id;
    sel=def.id;
  }
  el.innerHTML=data.accounts.map(a=>`
    <button class="acc-pick${a.id===sel?' sel':''}" onclick="pickAcc('${type}','${a.id}')">
      ${a.icon} ${a.name}${a.isDefault?' ★':''}
    </button>`).join('');
}
function pickAcc(type,id){
  if(type==='exp') selExpAcc=id;
  else if(type==='inc') selIncAcc=id;
  else if(type==='loan') selLoanAcc=id;
  else if(type==='ret') selRetAcc=id;
  const map={exp:'expAccPick',inc:'incAccPick',loan:'loanAccPick',ret:'retAccPick'};
  renderAccPick(map[type],type);
}

// ── HEADER ────────────────────────────────────────────
function updateHeader(){
  const totalBal=data.accounts.reduce((s,a)=>s+a.balance,0);
  const totalInc=data.income.reduce((s,i)=>s+i.amount,0);
  const totalExp=data.expenses.reduce((s,e)=>s+e.amount,0);
  const totalPend=data.loans.reduce((s,l)=>{const b=l.returned.reduce((a,r)=>a+r.amount,0);return s+}
.header::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,111,247,.3) 0%,transparent 70%);
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.app-name{font-family:'Playfair Display',serif;font-size:22px;color:#EEE8FF}
.balance-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.balance-amount{font-family:'Playfair Display',serif;font-size:40px;line-height:1;margin-bottom:4px}
.balance-amount.low{color:var(--red)}
.balance-amount.ok{color:#EEE8FF}
.balance-sub{display:flex;gap:20px;margin:12px 0 0;padding-bottom:16px}
.bsub{font-size:12px}
.bsub-label{color:var(--muted);margin-bottom:2px}
.bsub-val{font-weight:600}

/* ── TABS ── */
.tabs-wrap{background:#0F0F1A;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
.tabs{display:flex;overflow-x:auto;gap:0;scrollbar-width:none;padding:0 12px}
.tabs::-webkit-scrollbar{display:none}
.tab{border:none;background:none;color:var(--muted);font-family:'Sora',sans-serif;font-size:13px;padding:14px 16px;white-space:nowrap;cursor:pointer;position:relative;transition:color .2s}
.tab.active{color:var(--accent2)}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:2px 2px 0 0}

/* ── BODY ── */
.body{padding:18px 16px 100px}

/* ── INPUTS ── */
label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:5px}
.input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'Sora',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
select.input{appearance:none}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.fgroup{margin-bottom:14px}

/* ── BUTTONS ── */
.btn{width:100%;border:none;border-radius:12px;padding:14px;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn:active{opacity:.8}
.btn-primary{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#0F0F1A}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted)}

/* ── CARDS ── */
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid var(--border)}
.card-row{display:flex;align-items:center;gap:12px}
.icon-box{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-title{font-size:15px;font-weight:500}
.tx-sub{font-size:12px;color:var(--muted);margin-top:2px}
.tx-amt{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;text-align:right;flex-shrink:0}
.del-btn{background:none;border:none;color:var(--border);font-size:20px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0}
.del-btn:active{color:var(--red)}

/* ── PILLS ── */
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
.pill-red{background:rgba(248,113,113,.15);color:var(--red)}
.pill-green{background:rgba(52,211,153,.15);color:var(--green)}
.pill-yellow{background:rgba(251,191,36,.15);color:var(--yellow)}

/* ── PROGRESS ── */
.prog-track{height:5px;border-radius:999px;background:var(--border);margin-top:10px;overflow:hidden}
.prog-fill{height:5px;border-radius:999px;background:var(--green);transition:width .6s}

/* ── AVATAR ── */
.avatar{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}

/* ── BAR CHART ── */
.bar-row{margin-bottom:16px}
.bar-info{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.bar-track{height:8px;border-radius:999px;background:var(--border)}
.bar-fill{height:8px;border-radius:999px;transition:width .6s}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#1C1C30;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:480px;border-top:1px solid var(--border)}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:18px}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 22px;border-radius:999px;font-size:13px;z-index:300;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY ── */
.empty{text-align:center;color:var(--muted);padding:50px 0;font-size:14px}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(124,111,247,.5);z-index:100;display:flex;align-items:center;justify-content:center;line-height:1}

/* ── STAT BOXES ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border)}
.stat-box-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-box-val{font-family:'Playfair Display',serif;font-size:22px}

/* ── SECTION HEADER ── */
.section-head{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:18px 0 10px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="headerEl">
  <div class="header-top">
    <span class="app-name">MyFinance</span>
    <button onclick="openSetBalance()" style="background:rgba(124,111,247,.2);border:1px solid var(--accent);color:var(--accent2);border-radius:999px;padding:6px 14px;font-family:'Sora',sans-serif;font-size:12px;cursor:pointer">Set Balance</button>
  </div>
  <div class="balance-label">Current Balance</div>
  <div class="balance-amount" id="balanceDisplay">₹0</div>
  <div class="balance-sub">
    <div class="bsub"><div class="bsub-label">↑ Income</div><div class="bsub-val" id="totalIncomeDisplay" style="color:var(--green)">₹0</div></div>
    <div class="bsub"><div class="bsub-label">↓ Spent</div><div class="bsub-val" id="totalSpentDisplay" style="color:var(--red)">₹0</div></div>
    <div class="bsub"><div class="bsub-label">⟳ Pending</div><div class="bsub-val" id="totalPendingDisplay" style="color:var(--yellow)">₹0</div></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add',this)">＋ Add</button>
    <button class="tab" onclick="switchTab('income',this)">💰 Income</button>
    <button class="tab" onclick="switchTab('people',this)">👤 People</button>
    <button class="tab" onclick="switchTab('history',this)">History</button>
    <button class="tab" onclick="switchTab('summary',this)">Summary</button>
  </div>
</div>

<!-- BODY -->
<div class="body">

  <!-- ADD EXPENSE -->
  <div id="tab-add">
    <div class="fgroup"><label>Amount (₹)</label><input class="input" type="number" id="expAmt" placeholder="0"/></div>
    <div class="fgroup"><label>Category</label>
      <select class="input" id="expCat">
        <option value="food">🍔 Food</option>
        <option value="transport">🚗 Transport</option>
        <option value="shopping">🛍️ Shopping</option>
        <option value="bills">💡 Bills</option>
        <option value="entertainment">🎬 Entertainment</option>
        <option value="health">🏥 Health</option>
        <option value="other">📦 Other</option>
      </select>
    </div>
    <div class="fgroup"><label>Note (optional)</label><input class="input" id="expNote" placeholder="What was this for?"/></div>
    <div class="fgroup"><label>Date</label><input class="input" type="date" id="expDate"/></div>
    <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>
  </div>

  <!-- INCOME -->
  <div id="tab-income" style="display:none">
    <div class="fgroup"><label>Amount (₹)</label><input class="input" type="number" id="incAmt" placeholder="0"/></div>
    <div class="fgroup"><label>Source</label>
      <select class="input" id="incSrc">
        <option value="salary">💼 Salary</option>
        <option value="freelance">💻 Freelance</option>
        <option value="gift">🎁 Gift</option>
        <option value="investment">📈 Investment</option>
        <option value="other">📦 Other</option>
      </select>
    </div>
    <div class="fgroup"><label>Note (optional)</label><input class="input" id="incNote" placeholder="e.g. March salary"/></div>
    <div class="fgroup"><label>Date</label><input class="input" type="date" id="incDate"/></div>
    <button class="btn btn-green" onclick="addIncome()">Add Income</button>
  </div>

  <!-- PEOPLE -->
  <div id="tab-people" style="display:none">
    <div class="card" style="margin-bottom:18px">
      <div style="font-family:'Playfair Display',serif;font-size:17px;margin-bottom:14px">💸 Gave Money To</div>
      <div class="fgroup"><label>Person's Name</label><input class="input" id="loanName" placeholder="e.g. Rahul"/></div>
      <div class="row2">
        <div class="fgroup"><label>Amount (₹)</label><input class="input" type="number" id="loanAmt" placeholder="0"/></div>
        <div class="fgroup"><label>Date</label><input class="input" type="date" id="loanDate"/></div>
      </div>
      <div class="fgroup"><label>Note (optional)</label><input class="input" id="loanNote" placeholder="Reason"/></div>
      <button class="btn btn-primary" onclick="addLoan()">Record</button>
    </div>
    <div id="peopleList"></div>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" style="display:none">
    <div id="historyList"></div>
  </div>

  <!-- SUMMARY -->
  <div id="tab-summary" style="display:none">
    <div class="stat-grid" id="summaryStats"></div>
    <div class="section-head">Spending by Category</div>
    <div id="categoryBars"></div>
    <div class="section-head">Income by Source</div>
    <div id="incomeBars"></div>
  </div>

</div>

<!-- SET BALANCE MODAL -->
<div class="modal-bg" id="setBalModal">
  <div class="modal">
    <div class="modal-title">Set Current Balance</div>
    <div class="fgroup"><label>How much money do you have right now? (₹)</label>
      <input class="input" type="number" id="setBal" placeholder="e.g. 15000"/>
    </div>
    <button class="btn btn-primary" onclick="confirmSetBalance()" style="margin-bottom:10px">Set Balance</button>
    <button class="btn btn-ghost" onclick="closeModal('setBalModal')">Cancel</button>
  </div>
</div>

<!-- RETURN MODAL -->
<div class="modal-bg" id="returnModal">
  <div class="modal">
    <div class="modal-title">↩ Mark Return</div>
    <div class="fgroup"><label>Amount Returned (₹)</label><input class="input" type="number" id="retAmt" placeholder="0"/></div>
    <div class="fgroup"><label>Date</label><input class="input" type="date" id="retDate"/></div>
    <button class="btn btn-green" onclick="confirmReturn()" style="margin-bottom:10px">Confirm Return</button>
    <button class="btn btn-ghost" onclick="closeModal('returnModal')">Cancel</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────
const CATS = {
  food:{label:'🍔 Food',color:'#FF6B6B'},
  transport:{label:'🚗 Transport',color:'#4ECDC4'},
  shopping:{label:'🛍️ Shopping',color:'#FFE66D'},
  bills:{label:'💡 Bills',color:'#A8E6CF'},
  entertainment:{label:'🎬 Entertainment',color:'#C3A6FF'},
  health:{label:'🏥 Health',color:'#FF9A9E'},
  other:{label:'📦 Other',color:'#B8BEC8'}
};
const INCSRC = {
  salary:{label:'💼 Salary',color:'#34D399'},
  freelance:{label:'💻 Freelance',color:'#60A5FA'},
  gift:{label:'🎁 Gift',color:'#F472B6'},
  investment:{label:'📈 Investment',color:'#A78BFA'},
  other:{label:'📦 Other',color:'#B8BEC8'}
};

let data = {
  balance: 0,        // current wallet balance
  expenses: [],      // {id, amount, category, note, date}
  income: [],        // {id, amount, source, note, date}
  loans: []          // {id, personName, amount, note, date, returned:[{amount,date}]}
};

function load(){
  const s = localStorage.getItem('myfinance');
  if(s) data = JSON.parse(s);
}
function save(){ localStorage.setItem('myfinance', JSON.stringify(data)); }

// ── FORMAT ────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR',maximumFractionDigits:0}).format(n);
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = d => new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);

// ── TOAST ─────────────────────────────────────────────
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

// ── TABS ──────────────────────────────────────────────
let currentTab = 'add';
function switchTab(name, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('[id^=tab-]').forEach(t=>t.style.display='none');
  document.getElementById('tab-'+name).style.display='';
  currentTab = name;
  renderTab(name);
}
function renderTab(name){
  if(name==='history') renderHistory();
  if(name==='people') renderPeople();
  if(name==='summary') renderSummary();
}

// ── BALANCE ───────────────────────────────────────────
function updateHeader(){
  const totalInc = data.income.reduce((s,i)=>s+i.amount,0);
  const totalExp = data.expenses.reduce((s,e)=>s+e.amount,0);
  const totalPend = data.loans.reduce((s,l)=>{
    const back = l.returned.reduce((a,r)=>a+r.amount,0);
    return s + Math.max(0, l.amount - back);
  },0);

  const bal = data.balance;
  const el = document.getElementById('balanceDisplay');
  el.textContent = fmt(bal);
  el.className = 'balance-amount ' + (bal < 500 ? 'low' : 'ok');
  document.getElementById('totalIncomeDisplay').textContent = fmt(totalInc);
  document.getElementById('totalSpentDisplay').textContent = fmt(totalExp);
  document.getElementById('totalPendingDisplay').textContent = fmt(totalPend);
}

function openSetBalance(){
  document.getElementById('setBal').value = data.balance || '';
  document.getElementById('setBalModal').classList.add('open');
}
function confirmSetBalance(){
  const v = Number(document.getElementById('setBal').value);
  if(!v && v!==0){toast('Enter a valid amount ❌');return;}
  data.balance = v;
  save(); updateHeader(); closeModal('setBalModal');
  toast('Balance updated ✅');
}

// ── ADD EXPENSE ───────────────────────────────────────
function addExpense(){
  const amt = Number(document.getElementById('expAmt').value);
  if(!amt||amt<=0){toast('Enter valid amount ❌');return;}
  const entry = {id:uid(), amount:amt, category:document.getElementById('expCat').value,
    note:document.getElementById('expNote').value, date:document.getElementById('expDate').value||today()};
  data.expenses.unshift(entry);
  data.balance = Math.max(0, data.balance - amt);
  save(); updateHeader();
  document.getElementById('expAmt').value='';
  document.getElementById('expNote').value='';
  toast('Expense added ✅');
  switchTab('history', document.querySelectorAll('.tab')[3]);
}

// ── ADD INCOME ────────────────────────────────────────
function addIncome(){
  const amt = Number(document.getElementById('incAmt').value);
  if(!amt||amt<=0){toast('Enter valid amount ❌');return;}
  const entry = {id:uid(), amount:amt, source:document.getElementById('incSrc').value,
    note:document.getElementById('incNote').value, date:document.getElementById('incDate').value||today()};
  data.income.unshift(entry);
  data.balance += amt;
  save(); updateHeader();
  document.getElementById('incAmt').value='';
  document.getElementById('incNote').value='';
  toast('Income added ✅');
}

// ── ADD LOAN ──────────────────────────────────────────
function addLoan(){
  const name = document.getElementById('loanName').value.trim();
  const amt = Number(document.getElementById('loanAmt').value);
  if(!name){toast('Enter person name ❌');return;}
  if(!amt||amt<=0){toast('Enter valid amount ❌');return;}
  const entry = {id:uid(), personName:name, amount:amt,
    note:document.getElementById('loanNote').value, date:document.getElementById('loanDate').value||today(), returned:[]};
  data.loans.unshift(entry);
  data.balance = Math.max(0, data.balance - amt);
  save(); updateHeader();
  document.getElementById('loanName').value='';
  document.getElementById('loanAmt').value='';
  document.getElementById('loanNote').value='';
  toast('Recorded ✅');
  renderPeople();
}

// ── RETURN ────────────────────────────────────────────
let pendingReturnId = null;
function openReturn(loanId, maxAmt){
  pendingReturnId = loanId;
  document.getElementById('retAmt').value = maxAmt;
  document.getElementById('retDate').value = today();
  document.getElementById('returnModal').classList.add('open');
}
function confirmReturn(){
  const amt = Number(document.getElementById('retAmt').value);
  if(!amt||amt<=0){toast('Enter amount ❌');return;}
  const loan = data.loans.find(l=>l.id===pendingReturnId);
  if(!loan)return;
  loan.returned.push({amount:amt, date:document.getElementById('retDate').value||today()});
  data.balance += amt;
  save(); updateHeader(); closeModal('returnModal');
  toast('Return recorded ✅');
  renderPeople();
}

// ── DELETE ────────────────────────────────────────────
function deleteExpense(id){
  const e = data.expenses.find(x=>x.id===id);
  if(e){ data.balance += e.amount; data.expenses = data.expenses.filter(x=>x.id!==id); }
  save(); updateHeader(); renderHistory();
  toast('Deleted 🗑️');
}
function deleteIncome(id){
  const e = data.income.find(x=>x.id===id);
  if(e){ data.balance = Math.max(0, data.balance - e.amount); data.income = data.income.filter(x=>x.id!==id); }
  save(); updateHeader(); renderHistory();
  toast('Deleted 🗑️');
}
function deleteLoan(id){
  const l = data.loans.find(x=>x.id===id);
  if(l){
    const bal = l.amount - l.returned.reduce((s,r)=>s+r.amount,0);
    data.balance += bal; // refund pending amount
    data.loans = data.loans.filter(x=>x.id!==id);
  }
  save(); updateHeader(); renderPeople();
  toast('Deleted 🗑️');
}

// ── RENDER HISTORY ────────────────────────────────────
function renderHistory(){
  // Merge all transactions sorted by date desc
  const all = [
    ...data.expenses.map(e=>({...e,type:'expense'})),
    ...data.income.map(i=>({...i,type:'income'})),
    ...data.loans.map(l=>({...l,type:'loan'})),
  ].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));

  const el = document.getElementById('historyList');
  if(all.length===0){el.innerHTML='<div class="empty">No transactions yet</div>';return;}

  let html = '';
  let lastDate = '';
  for(const tx of all){
    if(tx.date !== lastDate){
      html += `<div class="section-head">${fmtDate(tx.date)}</div>`;
      lastDate = tx.date;
    }
    if(tx.type==='expense'){
      const c = CATS[tx.category]||CATS.other;
      html += `<div class="card"><div class="card-row">
        <div class="icon-box" style="background:${c.color}22">${c.label.split(' ')[0]}</div>
        <div style="flex:1"><div class="tx-title">${tx.note||c.label.split(' ').slice(1).join(' ')}</div>
        <div class="tx-sub">${c.label.split(' ').slice(1).join(' ')}</div></div>
        <div class="tx-amt" style="color:var(--red)">−${fmt(tx.amount)}</div>
        <button class="del-btn" onclick="deleteExpense('${tx.id}')">×</button>
      </div></div>`;
    } else if(tx.type==='income'){
      const s = INCSRC[tx.source]||INCSRC.other;
      html += `<div class="card"><div class="card-row">
        <div class="icon-box" style="background:${s.color}22">${s.label.split(' ')[0]}</div>
        <div style="flex:1"><div class="tx-title">${tx.note||s.label.split(' ').slice(1).join(' ')}</div>
        <div class="tx-sub">${s.label.split(' ').slice(1).join(' ')}</div></div>
        <div class="tx-amt" style="color:var(--green)">+${fmt(tx.amount)}</div>
        <button class="del-btn" onclick="deleteIncome('${tx.id}')">×</button>
      </div></div>`;
    } else {
      const bal = tx.amount - tx.returned.reduce((s,r)=>s+r.amount,0);
      html += `<div class="card"><div class="card-row">
        <div class="icon-box" style="background:rgba(251,191,36,.1)">💸</div>
        <div style="flex:1"><div class="tx-title">Gave to ${tx.personName}</div>
        <div class="tx-sub">${tx.note||'Loan'}</div></div>
        <div class="tx-amt" style="color:var(--yellow)">−${fmt(tx.amount)}</div>
        <button class="del-btn" onclick="deleteLoan('${tx.id}')">×</button>
      </div></div>`;
    }
  }
  el.innerHTML = html;
}

// ── RENDER PEOPLE ─────────────────────────────────────
function renderPeople(){
  // Group by person
  const map = {};
  data.loans.forEach(l=>{
    if(!map[l.personName]) map[l.personName]=[];
    map[l.personName].push(l);
  });

  const el = document.getElementById('peopleList');
  if(!Object.keys(map).length){el.innerHTML='<div class="empty">No records yet</div>';return;}

  let html = '';
  for(const [name, loans] of Object.entries(map)){
    const totalGiven = loans.reduce((s,l)=>s+l.amount,0);
    const totalBack = loans.reduce((s,l)=>s+l.returned.reduce((a,r)=>a+r.amount,0),0);
    const balance = totalGiven - totalBack;
    const pct = totalGiven>0?Math.min(100,Math.round(totalBack/totalGiven*100)):0;

    html += `<div class="card">
      <div class="card-row" onclick="togglePerson('${name}')" style="cursor:pointer">
        <div class="avatar">${name.charAt(0).toUpperCase()}</div>
        <div style="flex:1">
          <div class="tx-title">${name}</div>
          <div class="tx-sub">${loans.length} entry${loans.length>1?'s':''} · ${fmt(totalBack)} returned</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Playfair Display',serif;font-size:18px;color:${balance>0?'var(--red)':'var(--green)'}">${fmt(balance)}</div>
          <span class="pill ${balance>0?'pill-red':'pill-green'}">${balance>0?'pending':'cleared'}</span>
        </div>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>`;

    html += `<div id="person-${name.replace(/\s/g,'_')}" style="display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px">`;
    for(const l of loans){
      const lbal = l.amount - l.returned.reduce((s,r)=>s+r.amount,0);
      html += `<div style="background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:17px">${fmt(l.amount)}</div>
            <div style="font-size:12px;color:var(--muted)">${fmtDate(l.date)}${l.note?' · '+l.note:''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="pill ${lbal>0?'pill-red':'pill-green'}">${lbal>0?fmt(lbal)+' due':'✓ done'}</span>
            <button class="del-btn" onclick="deleteLoan('${l.id}')">×</button>
          </div>
        </div>`;
      if(l.returned.length){
        html += '<div style="margin-top:8px;border-top:1px dashed var(--border);padding-top:8px">';
        l.returned.forEach(r=>{
          html += `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--green);padding:2px 0">
            <span>↩ Returned</span><span>${fmt(r.amount)} · ${fmtDate(r.date)}</span></div>`;
        });
        html += '</div>';
      }
      if(lbal>0){
        html += `<button onclick="openReturn('${l.id}',${lbal})" style="margin-top:10px;width:100%;background:rgba(52,211,153,.1);border:1.5px solid var(--green);color:var(--green);border-radius:10px;padding:8px;font-family:'Sora',sans-serif;font-size:13px;cursor:pointer">↩ Mark Return</button>`;
      }
      html += '</div>';
    }
    html += '</div></div>';
  }
  el.innerHTML = html;
}

function togglePerson(name){
  const key = name.replace(/\s/g,'_');
  const el = document.getElementById('person-'+key);
  if(el) el.style.display = el.style.display==='none'?'':'none';
}

// ── RENDER SUMMARY ────────────────────────────────────
function renderSummary(){
  const totalExp = data.expenses.reduce((s,e)=>s+e.amount,0);
  const totalInc = data.income.reduce((s,i)=>s+i.amount,0);
  const totalPend = data.loans.reduce((s,l)=>{
    const back=l.returned.reduce((a,r)=>a+r.amount,0);
    return s+Math.max(0,l.amount-back);
  },0);

  document.getElementById('summaryStats').innerHTML = `
    <div class="stat-box"><div class="stat-box-label">Total Income</div><div class="stat-box-val" style="color:var(--green)">${fmt(totalInc)}</div></div>
    <div class="stat-box"><div class="stat-box-label">Total Spent</div><div class="stat-box-val" style="color:var(--red)">${fmt(totalExp)}</div></div>
    <div class="stat-box"><div class="stat-box-label">Balance</div><div class="stat-box-val">${fmt(data.balance)}</div></div>
    <div class="stat-box"><div class="stat-box-label">Pending</div><div class="stat-box-val" style="color:var(--yellow)">${fmt(totalPend)}</div></div>
  `;

  // Category bars
  let catHtml = '';
  const byCat = Object.entries(CATS).map(([k,v])=>({
    ...v, key:k, amount:data.expenses.filter(e=>e.category===k).reduce((s,e)=>s+e.amount,0)
  })).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);

  if(byCat.length===0) catHtml='<div style="color:var(--muted);font-size:13px">No expenses yet</div>';
  else byCat.forEach(c=>{
    const pct = totalExp>0?Math.round(c.amount/totalExp*100):0;
    catHtml+=`<div class="bar-row">
      <div class="bar-info"><span>${c.label}</span><span style="color:var(--muted)">${fmt(c.amount)} <span style="font-size:11px">${pct}%</span></span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
    </div>`;
  });
  document.getElementById('categoryBars').innerHTML = catHtml;

  // Income bars
  let incHtml = '';
  const byInc = Object.entries(INCSRC).map(([k,v])=>({
    ...v, key:k, amount:data.income.filter(i=>i.source===k).reduce((s,i)=>s+i.amount,0)
  })).filter(i=>i.amount>0).sort((a,b)=>b.amount-a.amount);

  if(byInc.length===0) incHtml='<div style="color:var(--muted);font-size:13px">No income yet</div>';
  else byInc.forEach(s=>{
    const pct = totalInc>0?Math.round(s.amount/totalInc*100):0;
    incHtml+=`<div class="bar-row">
      <div class="bar-info"><span>${s.label}</span><span style="color:var(--muted)">${fmt(s.amount)} <span style="font-size:11px">${pct}%</span></span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
    </div>`;
  });
  document.getElementById('incomeBars').innerHTML = incHtml;
}

// ── MODAL ─────────────────────────────────────────────
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); });
});

// ── INIT ──────────────────────────────────────────────
load();
// Set default dates
['expDate','incDate','loanDate','retDate'].forEach(id=>{
  const el=document.getElementById(id); if(el) el.value=today();
});
updateHeader();
</script>
